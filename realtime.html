<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbit Diary — 推しみちびき LIVE</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#06081a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit Diary">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.4/satellite.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #06081a;
    --bg-card: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.07);
    --text: #e4e7f0;
    --text-sub: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.25);
    --c2: #64b5f6; --c3: #ffd54f; --c4: #b39ddb;
    --c1r: #ef9a9a; --c6: #80deea;
    --green: #81c784; --pink: #f48fb1; --orange: #ffab91;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield canvas */
  #starCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow behind app */
  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }
  .app::before {
    content: '';
    position: fixed;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,213,79,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  /* Loading */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s ease-out;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 48px; height: 48px;
    position: relative;
  }
  .loading-spinner::before {
    content: '';
    position: absolute; inset: 0;
    border: 2px solid transparent;
    border-top-color: var(--c3);
    border-right-color: rgba(255,213,79,0.3);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loading-spinner::after {
    content: '';
    position: absolute; inset: 6px;
    border: 1.5px solid transparent;
    border-bottom-color: var(--c2);
    border-left-color: rgba(100,181,246,0.2);
    border-radius: 50%;
    animation: spin 1.5s linear infinite reverse;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px; color: var(--text-sub); margin-top: 20px;
    font-weight: 300; letter-spacing: 2px;
  }
  .loading-sub { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: 'Space Mono', monospace; }

  /* Top bar */
  .top-bar {
    padding: 56px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-logo {
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--text) 40%, var(--c3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .top-live {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--green);
    font-family: 'Space Mono', monospace;
    padding: 4px 10px;
    background: rgba(129,199,132,0.06);
    border: 1px solid rgba(129,199,132,0.12);
    border-radius: 20px;
  }
  .top-live-dot {
    width: 6px; height: 6px; background: var(--green); border-radius: 50%;
    box-shadow: 0 0 6px rgba(129,199,132,0.6);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:.3;} }

  /* Observer */
  .observer-bar {
    margin: 4px 20px 10px;
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-dim);
  }
  .observer-bar .loc { color: var(--text-sub); font-weight: 500; }

  /* Oshi selector */
  .oshi-scroll {
    display: flex; gap: 8px; padding: 4px 20px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .oshi-scroll::-webkit-scrollbar { display: none; }

  .oshi-chip {
    flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer; width: 60px;
    transition: transform 0.2s;
  }
  .oshi-chip:active { transform: scale(0.95); }

  .oshi-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; position: relative;
    border: 2px solid transparent; transition: all 0.3s;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }

  .oshi-elev {
    font-family: 'Space Mono', monospace;
    font-size: 8px; font-weight: 700;
    position: absolute; bottom: -3px;
    background: var(--bg); padding: 0 4px;
    border-radius: 6px; border: 1px solid var(--border);
    white-space: nowrap;
  }

  .oshi-name { font-size: 9px; color: var(--text-dim); white-space: nowrap; transition: color 0.3s; }
  .oshi-chip.selected .oshi-name { color: var(--text); font-weight: 600; }
  .oshi-chip.selected .oshi-avatar {
    box-shadow: 0 0 20px rgba(255,213,79,0.25), 0 0 40px rgba(255,213,79,0.08);
    transform: scale(1.08);
  }
  .oshi-chip.on-duty .oshi-name::after { content: ' 👑'; }

  .sat-c2 .oshi-avatar { background: rgba(100,181,246,0.12); border-color: rgba(100,181,246,0.25); color: var(--c2); }
  .sat-c3 .oshi-avatar { background: rgba(255,213,79,0.12); border-color: rgba(255,213,79,0.3); color: var(--c3); }
  .sat-c4 .oshi-avatar { background: rgba(179,157,219,0.12); border-color: rgba(179,157,219,0.25); color: var(--c4); }
  .sat-c1r .oshi-avatar { background: rgba(239,154,154,0.12); border-color: rgba(239,154,154,0.25); color: var(--c1r); }
  .sat-c6 .oshi-avatar { background: rgba(128,222,234,0.12); border-color: rgba(128,222,234,0.25); color: var(--c6); }

  .oshi-chip.selected.sat-c2 .oshi-avatar { border-color: var(--c2); }
  .oshi-chip.selected.sat-c3 .oshi-avatar { border-color: var(--c3); }
  .oshi-chip.selected.sat-c4 .oshi-avatar { border-color: var(--c4); }
  .oshi-chip.selected.sat-c1r .oshi-avatar { border-color: var(--c1r); }
  .oshi-chip.selected.sat-c6 .oshi-avatar { border-color: var(--c6); }

  /* Profile card */
  .profile-card {
    margin: 0 20px 12px;
    padding: 20px;
    border-radius: 20px;
    position: relative; overflow: hidden;
    transition: all 0.4s;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .profile-card::before {
    content: ''; position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
    animation: cardGlow 6s ease-in-out infinite;
  }
  .profile-card::after {
    content: ''; position: absolute;
    bottom: -40px; left: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,213,79,0.04), transparent 70%);
  }
  @keyframes cardGlow {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .profile-top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .profile-identity { display: flex; align-items: center; gap: 10px; }
  .profile-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900;
  }
  .profile-name { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .profile-sub { font-size: 10px; color: var(--text-sub); }
  .oshi-btn {
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    border: none; font-family: 'Noto Sans JP', sans-serif;
    background: rgba(255,255,255,0.08);
    color: var(--text-sub);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .oshi-btn.is-oshi {
    border: 1px solid rgba(255,213,79,0.3);
  }

  .profile-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px; margin-top: 12px;
  }
  .pg-item { text-align: center; }
  .pg-val {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700; line-height: 1;
  }
  .pg-label { font-size: 8px; color: var(--text-dim); margin-top: 3px; }

  .profile-bio {
    margin-top: 12px; font-size: 12px; color: var(--text-sub);
    line-height: 1.7; font-weight: 300;
  }
  .profile-bio em { font-style: normal; font-weight: 500; }

  /* Sky plot */
  .skyplot-section {
    margin: 0 20px 14px; padding: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--border); border-radius: 18px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .skyplot-title {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 8px; display: flex;
    align-items: center; justify-content: space-between;
    font-family: 'Space Mono', monospace;
  }
  .skyplot-container { position: relative; width: 100%; padding-bottom: 100%; }
  .skyplot-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Narrative diary */
  .diary-section { margin: 0 20px 12px; }
  .diary-section-title {
    font-size: 12px; font-weight: 500; color: var(--text-sub);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .diary-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .diary-post {
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%);
    border: 1px solid var(--border);
    border-radius: 18px; overflow: hidden; margin-bottom: 10px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: transform 0.2s;
  }
  .diary-post:active { transform: scale(0.99); }

  .post-header {
    padding: 12px 14px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .post-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900; flex-shrink: 0;
  }
  .post-meta { flex: 1; }
  .post-author { font-size: 12px; font-weight: 600; }
  .post-time { font-size: 9px; color: var(--text-dim); font-family: 'Space Mono', monospace; }

  .post-body {
    padding: 10px 14px 14px;
    font-size: 13px; line-height: 1.9;
    color: var(--text-sub); font-weight: 300;
  }
  .post-body em { font-style: normal; font-weight: 500; }

  .post-event {
    margin: 0 14px 12px; padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .pe-icon { font-size: 16px; flex-shrink: 0; }
  .pe-body { flex: 1; }
  .pe-title { font-size: 11px; font-weight: 500; color: var(--text); }
  .pe-desc { font-size: 10px; color: var(--text-sub); line-height: 1.5; }

  .post-footer {
    padding: 6px 14px 10px;
    display: flex; align-items: center; gap: 18px;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .pf-action {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-dim); cursor: pointer;
  }
  .pf-action.liked { color: var(--pink); }

  /* All sats */
  .sats-list { margin: 0 20px 12px; }
  .sats-list-title {
    font-size: 12px; font-weight: 500; color: var(--text-sub);
    margin-bottom: 8px;
  }
  .sr {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 8px; transition: all 0.3s;
    cursor: pointer;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .sr:active { transform: scale(0.98); }
  .sr.is-duty {
    border-color: rgba(255,213,79,0.2);
    background: linear-gradient(135deg, rgba(255,213,79,0.06), rgba(255,213,79,0.02));
    box-shadow: 0 0 20px rgba(255,213,79,0.04);
  }
  .sr.is-selected { border-color: rgba(255,255,255,0.15); }
  .sr-av {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900; flex-shrink: 0;
  }
  .sr-info { flex: 1; }
  .sr-name { font-size: 12px; font-weight: 500; }
  .sr-sub { font-size: 9px; color: var(--text-dim); font-family: 'Space Mono', monospace; }
  .sr-right { text-align: right; flex-shrink: 0; }
  .sr-elev { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
  .sr-status {
    font-size: 8px; padding: 2px 6px; border-radius: 6px; font-weight: 600;
    margin-top: 2px; display: inline-block;
  }

  /* Source */
  .source-bar {
    margin: 4px 20px 20px; padding: 10px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; font-size: 9px; color: var(--text-dim);
    line-height: 1.6; font-family: 'Space Mono', monospace;
  }

  .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Smooth transitions for dynamic content */
  .profile-grid, .sr-elev, .pg-val {
    transition: color 0.3s ease;
  }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div class="app">

  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">ORBIT DIARY</div>
    <div class="loading-sub" id="loadingStatus">軌道データを取得中...</div>
  </div>

  <div id="main" style="display:none;">
    <div class="top-bar fade-in">
      <div class="top-logo">ORBIT DIARY</div>
      <div class="top-live"><div class="top-live-dot"></div>LIVE <span id="clock">--:--:--</span></div>
    </div>
    <div class="observer-bar fade-in">
      <span>📍 <span class="loc" id="obsName">東京</span></span>
      <span id="obsCoords">35.68°N, 139.77°E</span>
    </div>
    <div class="oshi-scroll fade-in" id="oshiBar"></div>
    <div class="profile-card fade-in" id="profileCard"></div>
    <div class="skyplot-section fade-in">
      <div class="skyplot-title"><span>SKY PLOT</span><span id="skyTime">--:--:--</span></div>
      <div class="skyplot-container"><canvas class="skyplot-canvas" id="skyCanvas"></canvas></div>
    </div>
    <div class="diary-section fade-in" id="diarySection"></div>
    <div class="sats-list fade-in">
      <div class="sats-list-title">コンステレーション全機</div>
      <div id="satsList"></div>
    </div>
    <div class="source-bar fade-in" id="sourceBar"></div>
    <div style="height:20px;"></div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const SATS = [
  // QZO (figure-8 orbit)
  { id:'qzs2',  norad:42738, name:'みちびき2号機',  short:'02', type:'QZO', color:'#64b5f6', cd:'rgba(100,181,246,', cls:'c2',  launched:'2017.6.1',
    nickname: 'ニーちゃん', emoji: '😎',
    personality: 'cool',  // クール系・寡黙・頼れる兄貴
    bio:'寡黙だけど仕事は確実。深夜〜早朝のシフトが多くて、みんなが寝てる間も黙々と信号を送り続けてる。口数は少ないけど、いざという時いちばん頼りになるタイプ。',
    tone: { prefix: '…', suffix: '。', style: 'terse' },
  },
  { id:'qzs4',  norad:42965, name:'みちびき4号機',  short:'04', type:'QZO', color:'#b39ddb', cd:'rgba(179,157,219,', cls:'c4',  launched:'2017.10.10',
    nickname: 'ヨンちゃん', emoji: '✨',
    personality: 'genki',  // 元気系・おしゃべり・アイドル気質
    bio:'いちばんテンション高い。夕方〜夜のシフトで夜景を見るのが大好き。「今日も日本キレイ！」が口癖。ファンサが手厚い。自分のこと「ヨンちゃん」って呼ぶ。',
    tone: { prefix: '', suffix: '！', style: 'excited' },
  },
  { id:'qzs1r', norad:49336, name:'初号機後継(1R)',  short:'1R', type:'QZO', color:'#ef9a9a', cd:'rgba(239,154,154,', cls:'c1r', launched:'2021.10.26',
    nickname: 'いちあーる', emoji: '🔥',
    personality: 'earnest',  // 真面目系・初代の意志を継ぐ・熱い
    bio:'初代みちびきの軌道を引き継いだ。先代への敬意が強くて「初号機の分まで」が信条。真面目すぎてたまに空回りするけど、その一生懸命さがファンに刺さる。',
    tone: { prefix: '', suffix: 'っ！', style: 'earnest' },

  // GEO (geostationary)
  { id:'qzs3',  norad:42917, name:'みちびき3号機',  short:'03', type:'GEO', color:'#ffd54f', cd:'rgba(255,213,79,',  cls:'c3',  launched:'2017.8.19',
    nickname: 'さんちゃん', emoji: '🍵',
    personality: 'calm',  // 落ち着き系・母性・見守り役
    bio:'静止軌道からずっと同じ場所にいる。動かないことが強み。QZOの3機がわちゃわちゃしてるのを「まぁまぁ」って見守るお姉さんポジション。お茶が好き（設定）。',
    tone: { prefix: '', suffix: 'ね。', style: 'gentle' },
  },
  { id:'qzs6',  norad:62876, name:'みちびき6号機',  short:'06', type:'GEO', color:'#80deea', cd:'rgba(128,222,234,', cls:'c6',  launched:'2025.3.10',
    nickname: 'ろくちゃん', emoji: '🐣',
    personality: 'shy',  // 新人・おどおど・成長枠
    bio:'2025年に打ち上げられたばかりの最年少。3号機のとなりに配属されて緊張中。「あの…ちゃんとできてますか？」が口癖。でも信号の安定性は実はいちばん良い。',
    tone: { prefix: 'あの…', suffix: 'です…', style: 'shy' },
  },
];

// Real TLEs fetched 2026-04-18 — used only when CelesTrak is unreachable
const FALLBACK_TLES = {
  42738: ['1 42738U 17028A   26107.24072517 -.00000198  00000+0  00000+0 0  9993','2 42738  39.5227 244.0421 0741049 270.7350 276.1592  1.00250096  7013'],
  42917: ['1 42917U 17048A   26107.22127874 -.00000341  00000+0  00000+0 0  9999','2 42917   0.0570 208.2508 0001336 158.5376  45.2143  1.00275511 31645'],
  42965: ['1 42965U 17062A   26105.53943836 -.00000289  00000+0  00000+0 0  9995','2 42965  40.1466 344.2850 0745440 270.5878 283.3867  1.00268659 31172'],
  49336: ['1 49336U 21096A   26107.25339285 -.00000192  00000+0  00000+0 0  9997','2 49336  37.3379  80.4811 0750572 270.6290  81.1773  1.00275906 16401'],
  62876: ['1 62876U 25023A   26107.19052706 -.00000226  00000+0  00000+0 0  9996','2 62876   0.0165 279.4984 0001872 111.4808 333.4641  1.00269182  4341'],
};

// ========== REVERSE GEOCODING ==========
// Japan: nearest-point within 150km. Overseas/ocean: bounding boxes. No catch-all.
const JP_POINTS = [
  // Hokkaido
  [45.42,141.67,'稚内・宗谷',[{icon:'🐄',title:'宗谷の牧場',desc:'日本最北端の酪農地帯。GPS首輪で牛の放牧管理。'}]],

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function reverseGeocode(lat, lon) {
  while (lon > 180) lon -= 360;
  while (lon < -180) lon += 360;

  // 1) 日本の陸地: 最近傍200km以内
  let bestDist = Infinity, bestPt = null;
  for (const p of JP_POINTS) {
    const d = haversineKm(lat, lon, p[0], p[1]);
    if (d < bestDist) { bestDist = d; bestPt = p; }
  }
  if (bestPt && bestDist <= JP_RADIUS_KM) {
    return { name: bestPt[2] + '上空', flag: '🇯🇵', events: bestPt[3] || [] };
  }

  // 2) 海域: 最近傍500km以内
  let seaDist = Infinity, seaPt = null;
  for (const p of SEA_POINTS) {
    const d = haversineKm(lat, lon, p[0], p[1]);
    if (d < seaDist) { seaDist = d; seaPt = p; }
  }
  if (seaPt && seaDist <= 500) {
    return { name: seaPt[2] + '上空', flag: '🌊', events: seaPt[3] || [] };
  }

  // 3) 海外: bounding box
  for (const r of OVERSEAS_REGIONS) {
    if (lat >= r.lat[0] && lat <= r.lat[1] && lon >= r.lon[0] && lon <= r.lon[1]) {
      return { name: r.name, flag: r.flag, events: r.events || [] };
    }
  }

  // 4) フォールバック: 座標
  const ns = lat >= 0 ? 'N' : 'S';
  const ew = lon >= 0 ? 'E' : 'W';
  return { name: `${Math.abs(lat).toFixed(1)}°${ns} ${Math.abs(lon).toFixed(1)}°${ew} 付近`, flag: '🌏', events: [] };
}

// ========== TLE FETCH ==========
async function fetchTLEs() {
  const st = document.getElementById('loadingStatus');

  // Primary: group fetch
  try {
    st.textContent = 'CelesTrak MICHIBIKI...';
    const r = await fetch('https://celestrak.org/NORAD/elements/gp.php?NAME=MICHIBIKI&FORMAT=tle',
      { signal: AbortSignal.timeout(8000) });
    if (r.ok) {
      const t = await r.text();
      if (parseTLE(t)) { tleSource = 'celestrak-group'; return true; }
    }
  } catch(_){}

  // Fallback: individual CATNR
  for (const s of SATS) {
    try {
      st.textContent = `${s.name}...`;
      const r = await fetch(`https://celestrak.org/NORAD/elements/gp.php?CATNR=${s.norad}&FORMAT=tle`,
        { signal: AbortSignal.timeout(5000) });
      if (r.ok) { parseTLE(await r.text()); }
    } catch(_){}
  }
  if (Object.keys(satRecs).length > 0) { tleSource = 'celestrak-individual'; return true; }

  // Last resort: hardcoded
  st.textContent = 'Fallback TLE...';
  loadFallbackTLEs();
  return false;
}

function loadFallbackTLEs() {
  for (const s of SATS) {
    const tle = FALLBACK_TLES[s.norad];
    if (tle) {
      try { satRecs[s.norad] = { satrec: satellite.twoline2satrec(tle[0], tle[1]), def: s }; } catch(_){}
    }
  }
  tleSource = 'fallback';
}

function parseTLE(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  let found = 0;
  for (let i = 0; i < lines.length;) {
    // Skip name lines
    if (!lines[i].startsWith('1 ')) { i++; continue; }
    const t1 = lines[i]; i++;
    if (i >= lines.length || !lines[i].startsWith('2 ')) continue;
    const t2 = lines[i]; i++;
    const nid = parseInt(t1.substring(2, 7).trim());
    const def = SATS.find(s => s.norad === nid);
    if (!def) continue;
    try {
      satRecs[nid] = { satrec: satellite.twoline2satrec(t1, t2), def };
      const yr = parseInt(t1.substring(18, 20));
      const day = parseFloat(t1.substring(20, 32));
      tleEpoch = `20${yr < 57 ? yr : yr} day ${day.toFixed(2)}`;
      found++;
    } catch(_){}
  }
  return found > 0;
}

// ========== POSITION CALCULATION ==========
function calcPos(rec, date) {
  const pv = satellite.propagate(rec.satrec, date);
  if (!pv.position) return null;
  const gmst = satellite.gstime(date);
  const geo = satellite.eciToGeodetic(pv.position, gmst);
  const obsGeo = {
    longitude: satellite.degreesToRadians(observer.lon),
    latitude:  satellite.degreesToRadians(observer.lat),
    height:    observer.alt
  };
  const ecf = satellite.eciToEcf(pv.position, gmst);
  const la = satellite.ecfToLookAngles(obsGeo, ecf);
  return {
    lat:   satellite.degreesLat(geo.latitude),
    lon:   satellite.degreesLong(geo.longitude),
    alt:   geo.height,
    az:    satellite.radiansToDegrees(la.azimuth),
    el:    satellite.radiansToDegrees(la.elevation),
    range: la.rangeSat
  };
}

function getPositions(now) {
  const positions = {};
  for (const [nid, rec] of Object.entries(satRecs)) {
    try { positions[nid] = { pos: calcPos(rec, now), def: rec.def }; }
    catch(_) { positions[nid] = { pos: null, def: rec.def }; }
  }
  return positions;
}

function azDir(az) {
  const j = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
  return j[Math.round(az / 22.5) % 16];
}

// "当番" = highest elevation QZO visible from observer
function getDuty(positions) {
  return Object.values(positions)
    .filter(p => p.pos && p.def.type === 'QZO' && p.pos.el > 0)
    .sort((a, b) => b.pos.el - a.pos.el)[0] || null;
}

function getSelected(positions) {
  if (selectedSatId) {
    const found = Object.values(positions).find(p => p.def.id === selectedSatId);
    if (found) return found;
  }
  return getDuty(positions) || Object.values(positions).find(p => p.pos) || null;
}

function narrative(def, pos, hour) {
  if (!pos) return { text: 'データ計算中...', event: null, nadir: null };

  const el = pos.el.toFixed(1);
  const dir = azDir(pos.az);
  const alt = Math.round(pos.alt).toLocaleString();
  const nadir = reverseGeocode(pos.lat, pos.lon);
  const v = VOICE[def.personality] || VOICE.calm;
  let text = '';

  if (def.type === 'QZO') {
    if (pos.el > 70)      text = v.zenith(nadir.name, el);
    else if (pos.el > 40) text = v.high(nadir.name, el, dir);
    else if (pos.el > 10) text = v.mid(nadir.name, el);
    else if (pos.el > 0)  text = v.low(nadir.name, dir);
    else                  text = v.hidden(nadir.name, alt);
  } else {
    if (pos.el > 0) text = v.geoVis(nadir.name, el, dir);
    else            text = v.geoHid(nadir.name);
  }

  // Ground event
  let ev = null;
  if (nadir.events && nadir.events.length > 0) {
    ev = nadir.events[hour % nadir.events.length];
  }

  return { text, event: ev, nadir };
}

// ========== SKY PLOT ==========
function drawSky(canvas, positions) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 18;
  ctx.clearRect(0, 0, w, h);

  // Elevation rings
  [0, 30, 60].forEach(e => {
    const rr = r * (1 - e / 90);
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1; ctx.stroke();
    if (e > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '8px Space Mono'; ctx.textAlign = 'center';
      ctx.fillText(e + '°', cx, cy - rr + 10);
    }
  });
  // Zenith dot
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();

  // Cardinal directions
  [{l:'N',a:-90},{l:'E',a:0},{l:'S',a:90},{l:'W',a:180}].forEach(d => {
    const rad = d.a * Math.PI / 180;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '10px Space Mono'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.l, cx + (r + 12) * Math.cos(rad), cy + (r + 12) * Math.sin(rad));
  });

  // Plot each satellite
  const sel = getSelected(positions);
  Object.values(positions).forEach(({pos, def}) => {
    if (!pos || pos.el < -10) return;
    const vis = pos.el > 0;
    const dist = r * (1 - Math.max(0, pos.el) / 90);
    const azRad = (pos.az - 90) * Math.PI / 180;
    const sx = cx + dist * Math.cos(azRad);
    const sy = cy + dist * Math.sin(azRad);
    const isSel = sel && sel.def.id === def.id;

    // Glow for high-elevation
    if (vis && pos.el > 50) {
      ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 18);
      g.addColorStop(0, def.cd + '0.15)'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fill();
    }

    // Dot
    const dotR = isSel ? 7 : (vis ? 5 : 3);
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = vis ? def.color : def.cd + '0.3)';
    ctx.fill();

    if (vis) {
      ctx.beginPath(); ctx.arc(sx, sy, dotR + 3, 0, Math.PI * 2);
      ctx.strokeStyle = def.cd + (isSel ? '0.5)' : '0.2)');
      ctx.lineWidth = isSel ? 1.5 : 1; ctx.stroke();
    }

    // Label
    ctx.fillStyle = vis ? def.color : def.cd + '0.4)';
    ctx.font = `bold ${isSel ? '11' : '9'}px Space Mono`;
    ctx.textAlign = 'center';
    ctx.fillText(def.short, sx, sy - dotR - 5);

    // Elevation for selected
    if (isSel && vis) {
      ctx.fillStyle = def.cd + '0.7)';
      ctx.font = '8px Space Mono';
      ctx.fillText(pos.el.toFixed(1) + '°', sx, sy + dotR + 10);
    }
  });
}

  const duty = getDuty(positions);
  const sorted = Object.values(positions).filter(p => p).sort((a, b) => (b.pos?.el || 0) - (a.pos?.el || 0));
  const sel = getSelected(positions);

  el.innerHTML = sorted.map(({pos, def}) => {
    const isDuty = duty && duty.def.id === def.id;
    const isSel = sel && sel.def.id === def.id;
    const vis = pos && pos.el > 0;
    // Mood based on elevation
    const mood = !pos ? '' : pos.el > 70 ? '🔥' : pos.el > 30 ? '😊' : pos.el > 0 ? '🙂' : '💤';

      <div class="oshi-chip sat-${def.cls}${isSel ? ' selected' : ''}${isDuty ? ' on-duty' : ''}" onclick="selectSat('${def.id}')">

function buildDiary(positions, now) {
  const el = document.getElementById('diarySection');
  const entry = getSelected(positions);
  if (!entry) { el.innerHTML = ''; return; }
  const {pos, def} = entry;
  const hour = now.getHours();
  const { text, event, nadir } = narrative(def, pos, hour);
  const duty = getDuty(positions);
  const isDuty = duty && duty.def.id === def.id;
  const nadirLabel = nadir ? `${nadir.flag} ${nadir.name}` : '';

  // Deterministic heart count based on elevation
  const hearts = pos ? Math.max(0, Math.floor(pos.el * 50 + 500)) : 100;
  // Deterministic comment/share counts based on satellite NORAD + hour
  const seed = def.norad + hour;
  const comments = 50 + (seed * 7) % 200;
  const shares = 100 + (seed * 13) % 500;

  el.innerHTML = `
    <div class="diary-section-title">${def.emoji} ${def.nickname || def.name}のつぶやき</div>
    <div class="diary-post">
      <div class="post-header">
        <div class="post-avatar" style="background:${def.cd}0.15);border:1.5px solid ${def.cd}0.3);font-size:14px;">${def.emoji}</div>
        <div class="post-meta">
          <div class="post-author" style="color:${def.color};">${def.nickname || def.name} <span style="font-size:10px;color:var(--text-dim);font-weight:400;">@${def.id}</span></div>
          <div class="post-time">${now.toLocaleTimeString('ja-JP')} JST${isDuty ? ' — 👑当番中' : ''}</div>
        </div>
      </div>
      ${nadirLabel ? `<div style="padding:6px 14px 0;font-size:11px;color:var(--text-dim);">📌 直下点: <span style="color:var(--text-sub);font-weight:500;">${nadirLabel}</span> <span style="font-family:'Space Mono';font-size:9px;">(${pos.lat.toFixed(2)}°${pos.lat > 0 ? 'N' : 'S'}, ${pos.lon.toFixed(2)}°${pos.lon > 0 ? 'E' : 'W'})</span></div>` : ''}
      <div class="post-body">${text}</div>
      ${event ? `
        <div class="post-event">
          <div class="pe-icon">${event.icon}</div>
          <div class="pe-body">
            <div class="pe-title">${event.title}</div>
            <div class="pe-desc">${event.desc}</div>
          </div>
        </div>
      ` : ''}
      <div class="post-footer">
        <div class="pf-action liked">♥ ${hearts.toLocaleString()}</div>
        <div class="pf-action">💬 ${comments}</div>
        <div class="pf-action">🔄 ${shares}</div>
      </div>

  `;
}

function buildSatsList(positions) {
  const el = document.getElementById('satsList');
  const sorted = Object.values(positions).filter(p => p).sort((a, b) => (b.pos?.el || 0) - (a.pos?.el || 0));
  const duty = getDuty(positions);
  const sel = getSelected(positions);

  el.innerHTML = sorted.map(({pos, def}) => {
    const isDuty = duty && duty.def.id === def.id;
    const isSel = sel && sel.def.id === def.id;
    const vis = pos && pos.el > 0;
    let stText, stStyle;
    if (isDuty)                    { stText = '当番中';   stStyle = `background:${def.cd}0.15);color:${def.color};`; }
    else if (def.type === 'GEO' && vis) { stText = '常駐';   stStyle = `background:${def.cd}0.1);color:${def.color};`; }
    else if (vis)                  { stText = '視野内';   stStyle = `background:rgba(129,199,132,0.1);color:var(--green);`; }
    else                           { stText = '地平線下'; stStyle = `background:rgba(255,255,255,0.04);color:var(--text-dim);`; }

    const nadir = pos ? reverseGeocode(pos.lat, pos.lon) : null;
    const nadirStr = nadir ? `${nadir.flag} ${nadir.name}` : '---';

    return `
      <div class="sr${isDuty ? ' is-duty' : ''}${isSel ? ' is-selected' : ''}" onclick="selectSat('${def.id}')" style="cursor:pointer;">
        <div class="sr-av" style="background:${def.cd}0.12);border:1.5px solid ${def.cd}${vis ? '0.3' : '0.12'});font-size:16px;">${def.emoji}</div>
        <div class="sr-info">
          <div class="sr-name" style="color:${vis ? def.color : 'var(--text-dim)'};">${def.nickname || def.name}${isDuty ? ' 👑' : ''} <span style="font-size:9px;opacity:0.5;">${def.short}</span></div>
          <div class="sr-sub">${nadirStr} / ${pos ? Math.round(pos.alt).toLocaleString() + 'km' : '---'}</div>
        </div>
        <div class="sr-right">
          <div class="sr-elev" style="color:${vis ? def.color : 'var(--text-dim)'};">${pos ? pos.el.toFixed(1) + '°' : '---'}</div>
          <div class="sr-status" style="${stStyle}">${stText}</div>
        </div>
      </div>`;
  }).join('');
}

// ========== INTERACTION ==========
function selectSat(id) {
  selectedSatId = (selectedSatId === id) ? null : id;
}

function toggleOshi(id) {
  selectedSatId = id;
}

// ========== MAIN LOOP ==========
function update() {
  const now = new Date();
  const positions = getPositions(now);

  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
  document.getElementById('skyTime').textContent = now.toLocaleTimeString('ja-JP');

  buildOshi(positions);
  buildProfile(positions);
  drawSky(document.getElementById('skyCanvas'), positions);
  buildDiary(positions, now);
  buildSatsList(positions);
}

// ========== INIT ==========
async function init() {
  await fetchTLEs();

  // Ensure we always have data
  if (Object.keys(satRecs).length === 0) {
    loadFallbackTLEs();
  }

  document.getElementById('sourceBar').innerHTML =
    `SOURCE: ${tleSource} (${Object.keys(satRecs).length}機)<br>` +
    `SGP4 propagation via satellite.js<br>` +
    `${tleEpoch ? 'TLE EPOCH: ' + tleEpoch : 'Fallback TLE (精度低)'}<br>` +
    `UPDATE: 1秒間隔リアルタイム計算`;

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main').style.display = 'block';

  update();
  setInterval(update, 1000);
  window.addEventListener('resize', update);
}

(function(){
  const c = document.getElementById('starCanvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let stars = [];

  function resize() {
    c.width = window.innerWidth * dpr;
    c.height = window.innerHeight * dpr;
    c.style.width = window.innerWidth + 'px';
    c.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    createStars();
  }

  function createStars() {
    stars = [];
    const w = window.innerWidth, h = window.innerHeight;
    const count = Math.floor((w * h) / 3000); // density
    const colors = [
      'rgba(255,255,255,',      // white
      'rgba(255,255,255,',
      'rgba(255,255,255,',
      'rgba(255,213,79,',       // gold
      'rgba(100,181,246,',      // blue
      'rgba(179,157,219,',      // purple
    ];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.3,
        base: 0.2 + Math.random() * 0.6,
        speed: 0.3 + Math.random() * 0.7,
        phase: Math.random() * Math.PI * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        drift: (Math.random() - 0.5) * 0.02,
      });
    }
  }

  let t = 0;
  function draw() {
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    t += 0.01;
    for (const s of stars) {
      const flicker = s.base + Math.sin(t * s.speed + s.phase) * 0.25;
      const alpha = Math.max(0.05, Math.min(1, flicker));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + alpha.toFixed(2) + ')';
      ctx.fill();
      // Slow drift
      s.y += s.drift;
      if (s.y < -2) s.y = h + 2;
      if (s.y > h + 2) s.y = -2;
    }
    requestAnimationFrame(draw);
  }

  resize();
  draw();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
})();

init();
</script>
</body>
</html>
