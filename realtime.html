<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbit Diary — 推しみちびき LIVE</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#06081a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit Diary">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.4/satellite.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #06081a;
    --bg-card: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.07);
    --text: #e4e7f0;
    --text-sub: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.25);
    --c2: #64b5f6; --c3: #ffd54f; --c4: #b39ddb;
    --c1r: #ef9a9a; --c6: #80deea;
    --green: #81c784; --pink: #f48fb1; --orange: #ffab91;
    --nav-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield canvas */
  #starCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .app {
    max-width: 430px; margin: 0 auto;
    min-height: 100vh; position: relative; z-index: 1;
    padding-bottom: var(--nav-h);
  }
  .app::before {
    content: ''; position: fixed;
    top: -50%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,213,79,0.03) 0%, transparent 70%);
    pointer-events: none; z-index: -1;
  }

  /* Loading */
  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000; transition: opacity 0.8s ease-out;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 48px; height: 48px; position: relative; }
  .loading-spinner::before {
    content: ''; position: absolute; inset: 0;
    border: 2px solid transparent;
    border-top-color: var(--c3); border-right-color: rgba(255,213,79,0.3);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  .loading-spinner::after {
    content: ''; position: absolute; inset: 6px;
    border: 1.5px solid transparent;
    border-bottom-color: var(--c2); border-left-color: rgba(100,181,246,0.2);
    border-radius: 50%; animation: spin 1.5s linear infinite reverse;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-sub); margin-top: 20px; font-weight: 300; letter-spacing: 2px; }
  .loading-sub { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: 'Space Mono', monospace; }

  /* Top bar */
  .top-bar {
    padding: 56px 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-logo {
    font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--text) 40%, var(--c3) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .top-live {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--green); font-family: 'Space Mono', monospace;
    padding: 4px 10px; background: rgba(129,199,132,0.06);
    border: 1px solid rgba(129,199,132,0.12); border-radius: 20px;
  }
  .top-live-dot {
    width: 6px; height: 6px; background: var(--green); border-radius: 50%;
    box-shadow: 0 0 6px rgba(129,199,132,0.6); animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:.3;} }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== HOME: Unified oshi card ===== */
  .oshi-card-main {
    margin: 12px 20px 16px;
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .oshi-card-main::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
    animation: cardGlow 6s ease-in-out infinite;
  }
  .ocm-top {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 20px 14px;
  }
  .ocm-emoji {
    font-size: 52px; line-height: 1;
    filter: drop-shadow(0 0 16px rgba(255,255,255,0.08));
    animation: float 4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .ocm-info { flex: 1; }
  .ocm-name { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
  .ocm-status { font-size: 12px; margin-top: 2px; font-weight: 500; }
  .ocm-status.on { color: var(--c3); }
  .ocm-status.off { color: var(--text-dim); }
  .ocm-meta {
    display: flex; gap: 12px; margin-top: 6px;
    font-size: 10px; color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .ocm-meta strong { color: var(--text-sub); font-weight: 700; }
  .ocm-speech {
    padding: 14px 20px 16px;
    font-size: 15px; line-height: 2;
    font-weight: 300; color: var(--text-sub);
    border-top: 1px solid var(--border);
  }
  .ocm-speech em { font-style: normal; font-weight: 500; }
  .ocm-event {
    margin: 0 20px 16px; padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .ocm-event-icon { font-size: 16px; flex-shrink: 0; }
  .ocm-event-body { flex: 1; }
  .ocm-event-title { font-size: 11px; font-weight: 500; color: var(--text); }
  .ocm-event-desc { font-size: 10px; color: var(--text-sub); line-height: 1.5; }
  .ocm-nadir {
    padding: 10px 20px 14px;
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .ocm-nadir .loc { color: var(--text-sub); font-weight: 500; font-family: 'Noto Sans JP', sans-serif; }
  }

  /* Oshi selector row */
  .oshi-scroll {
    display: flex; gap: 8px; padding: 4px 20px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .oshi-scroll::-webkit-scrollbar { display: none; }
  .oshi-chip {
    flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer; width: 60px;
    transition: transform 0.2s;
  }
  .oshi-chip:active { transform: scale(0.95); }
  .oshi-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; position: relative;
    border: 2px solid transparent; transition: all 0.3s;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .oshi-elev {
    font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
    position: absolute; bottom: -3px;
    background: var(--bg); padding: 0 4px;
    border-radius: 6px; border: 1px solid var(--border); white-space: nowrap;
  }
  .oshi-name { font-size: 9px; color: var(--text-dim); white-space: nowrap; transition: color 0.3s; }
  .oshi-chip.selected .oshi-name { color: var(--text); font-weight: 600; }
  .oshi-chip.selected .oshi-avatar {
    box-shadow: 0 0 20px rgba(255,213,79,0.25), 0 0 40px rgba(255,213,79,0.08);
    transform: scale(1.08);
  }
  .oshi-chip.on-duty .oshi-name::after { content: ' \01F451'; }

  .sat-c2 .oshi-avatar { background: rgba(100,181,246,0.12); border-color: rgba(100,181,246,0.25); color: var(--c2); }
  .sat-c3 .oshi-avatar { background: rgba(255,213,79,0.12); border-color: rgba(255,213,79,0.3); color: var(--c3); }
  .sat-c4 .oshi-avatar { background: rgba(179,157,219,0.12); border-color: rgba(179,157,219,0.25); color: var(--c4); }
  .sat-c1r .oshi-avatar { background: rgba(239,154,154,0.12); border-color: rgba(239,154,154,0.25); color: var(--c1r); }
  .sat-c6 .oshi-avatar { background: rgba(128,222,234,0.12); border-color: rgba(128,222,234,0.25); color: var(--c6); }
  .oshi-chip.selected.sat-c2 .oshi-avatar { border-color: var(--c2); }
  .oshi-chip.selected.sat-c3 .oshi-avatar { border-color: var(--c3); }
  .oshi-chip.selected.sat-c4 .oshi-avatar { border-color: var(--c4); }
  .oshi-chip.selected.sat-c1r .oshi-avatar { border-color: var(--c1r); }
  .oshi-chip.selected.sat-c6 .oshi-avatar { border-color: var(--c6); }

  /* Sky plot */
  .skyplot-section {
    margin: 0 20px 14px; padding: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--border); border-radius: 18px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .skyplot-title {
    font-size: 11px; color: var(--text-dim); margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Space Mono', monospace;
  }
  .skyplot-container { position: relative; width: 100%; padding-bottom: 100%; }
  .skyplot-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Handoff card */
  .handoff-card {
    margin: 0 20px 14px; padding: 18px;
    border-radius: 18px; position: relative; overflow: hidden;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    background: linear-gradient(135deg, rgba(255,213,79,0.08), rgba(179,157,219,0.06));
    border: 1px solid rgba(255,213,79,0.15);
    animation: handoffSlideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes handoffSlideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .handoff-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--c3); margin-bottom: 10px; font-family: 'Space Mono', monospace;
  }
  .handoff-pair {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; font-size: 36px; margin: 8px 0;
  }
  .handoff-arrow { font-size: 20px; color: var(--c3); }
  .handoff-names {
    text-align: center; font-size: 13px; color: var(--text-sub); margin-bottom: 10px;
  }
  .handoff-convo {
    padding: 12px; background: rgba(0,0,0,0.2);
    border-radius: 12px; margin-top: 8px;
  }
  .handoff-line {
    font-size: 12px; line-height: 1.8; color: var(--text-sub);
    padding: 2px 0;
  }
  .handoff-line em { font-style: normal; font-weight: 600; }

  /* Constellation list */
  .sats-list { margin: 0 20px 12px; }
  .sats-list-title { font-size: 12px; font-weight: 500; color: var(--text-sub); margin-bottom: 8px; }
  .sr {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 8px; transition: all 0.3s; cursor: pointer;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .sr:active { transform: scale(0.98); }
  .sr.is-duty {
    border-color: rgba(255,213,79,0.2);
    background: linear-gradient(135deg, rgba(255,213,79,0.06), rgba(255,213,79,0.02));
    box-shadow: 0 0 20px rgba(255,213,79,0.04);
  }
  .sr-av {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .sr-info { flex: 1; }
  .sr-name { font-size: 12px; font-weight: 500; }
  .sr-sub { font-size: 9px; color: var(--text-dim); font-family: 'Space Mono', monospace; }
  .sr-right { text-align: right; flex-shrink: 0; }
  .sr-elev { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; }
  .sr-status {
    font-size: 8px; padding: 2px 6px; border-radius: 6px; font-weight: 600;
    margin-top: 2px; display: inline-block;
  }

  /* Source bar */
  .source-bar {
    margin: 4px 20px 20px; padding: 10px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; font-size: 9px; color: var(--text-dim);
    line-height: 1.6; font-family: 'Space Mono', monospace;
  }

  /* ===== CARDS PAGE ===== */
  .cards-header {
    padding: 20px 20px 10px; text-align: center;
  }
  .cards-header h2 { font-size: 18px; font-weight: 700; }
  .cards-count { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
  .cards-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 10px 20px 20px;
  }
  .cards-empty {
    text-align: center; padding: 40px 20px;
    color: var(--text-dim); font-size: 13px;
  }

  /* QSL Card */
  .qsl-card {
    background: linear-gradient(145deg, #1a1c2e 0%, #12142a 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 14px;
    position: relative; overflow: hidden;
    transform: rotate(-1deg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }
  .qsl-card:active { transform: rotate(0deg) scale(0.97); }
  .qsl-card::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px
    );
    pointer-events: none;
  }
  .qsl-card::after {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(255,213,79,0.06), transparent 70%);
    pointer-events: none;
  }
  .qsl-top { font-size: 7px; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); font-family: 'Space Mono', monospace; }
  .qsl-divider { height: 1px; background: var(--border); margin: 6px 0; }
  .qsl-label { font-size: 8px; color: var(--text-dim); margin-top: 4px; }
  .qsl-pair {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; font-size: 24px; margin: 6px 0;
  }
  .qsl-pair-arrow { font-size: 12px; color: var(--c3); }
  .qsl-names { text-align: center; font-size: 10px; color: var(--text-sub); }
  .qsl-time { font-size: 9px; font-family: 'Space Mono', monospace; color: var(--text-dim); margin-top: 6px; }
  .qsl-nadir { font-size: 9px; color: var(--text-sub); }
  .qsl-elev { font-size: 8px; font-family: 'Space Mono', monospace; color: var(--text-dim); }
  .qsl-rarity {
    margin-top: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  }
  .qsl-rarity-n { color: var(--text-dim); }
  .qsl-rarity-r { color: var(--c3); }
  .qsl-rarity-sr { color: var(--c4); text-shadow: 0 0 8px rgba(179,157,219,0.4); }
  .qsl-rarity-ssr { color: var(--pink); text-shadow: 0 0 12px rgba(244,143,177,0.5); animation: shimmer 2s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{opacity:1;}50%{opacity:0.7;} }
  .qsl-flavor { font-size: 8px; color: var(--text-sub); font-style: italic; margin-top: 2px; }
  .qsl-number { font-size: 8px; font-family: 'Space Mono', monospace; color: var(--text-dim); margin-top: 6px; }
  .qsl-footer { font-size: 7px; font-family: 'Space Mono', monospace; color: var(--text-dim); margin-top: 4px; text-align: right; }

  /* QSL large (detail modal view) */
  .qsl-card.large {
    transform: rotate(-2deg); max-width: 320px; margin: 20px auto; padding: 20px;
  }
  .qsl-card.large .qsl-pair { font-size: 36px; }
  .qsl-card.large .qsl-names { font-size: 13px; }

  /* ===== SETTINGS PAGE ===== */
  .settings-section {
    padding: 20px;
  }
  .settings-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .settings-oshi-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .settings-oshi-btn {
    padding: 16px; border-radius: 14px; cursor: pointer;
    background: var(--bg-card); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .settings-oshi-btn:active { transform: scale(0.97); }
  .settings-oshi-btn.selected { border-color: rgba(255,213,79,0.4); background: rgba(255,213,79,0.06); }
  .settings-oshi-btn .emoji { font-size: 32px; }
  .settings-oshi-btn .name { font-size: 13px; font-weight: 600; }
  .settings-oshi-btn .sub { font-size: 10px; color: var(--text-dim); }

  .settings-info {
    margin-top: 20px; padding: 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; font-size: 11px; color: var(--text-dim); line-height: 1.8;
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; height: var(--nav-h);
    background: rgba(6,8,26,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 8px 16px; border-radius: 12px;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { transform: scale(0.93); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; color: var(--text-dim); font-weight: 500; transition: color 0.2s; }
  .nav-btn.active .nav-label { color: var(--c3); }
  .nav-btn.active { background: rgba(255,213,79,0.06); }
  .nav-badge {
    position: absolute; top: 2px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pink); border: 1.5px solid var(--bg);
  }

  /* Utility */
  .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .section-title {
    font-size: 12px; font-weight: 500; color: var(--text-sub);
    margin: 0 20px 8px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div class="app">

  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">ORBIT DIARY</div>
    <div class="loading-sub" id="loadingStatus">軌道データを取得中...</div>
  </div>

  <div id="main" style="display:none;">
    <!-- Top bar (always visible) -->
    <div class="top-bar fade-in">
      <div class="top-logo">ORBIT DIARY</div>
      <div class="top-live"><div class="top-live-dot"></div>LIVE <span id="clock">--:--:--</span></div>
    </div>

    <!-- PAGE: Home -->
    <div class="page active" id="pageHome">
      <div class="oshi-card-main fade-in" id="oshiMain"></div>

      <div class="section-title fade-in">推しを選ぶ</div>
      <div class="oshi-scroll fade-in" id="oshiBar"></div>

      <div class="skyplot-section fade-in">
        <div class="skyplot-title"><span>SKY PLOT</span><span id="skyTime">--:--:--</span></div>
        <div class="skyplot-container"><canvas class="skyplot-canvas" id="skyCanvas"></canvas></div>
      </div>

      <div id="handoffCard"></div>

      <div class="section-title fade-in">コンステレーション全機</div>
      <div class="sats-list fade-in"><div id="satsList"></div></div>

      <div id="cardPreview"></div>
      <div class="source-bar fade-in" id="sourceBar"></div>
      <div style="height:20px;"></div>
    </div>

    <!-- PAGE: All satellites -->
    <div class="page" id="pageSats">
      <div style="padding:20px 20px 10px;"><h2 style="font-size:18px;font-weight:700;">みちびき全5機</h2></div>
      <div class="sats-list"><div id="satsListFull"></div></div>
      <div class="source-bar" id="sourceBarSats"></div>
      <div style="height:20px;"></div>

async function fetchTLEs() {
  const st = document.getElementById('loadingStatus');
  try {
    st.textContent = 'CelesTrak MICHIBIKI...';
    const r = await fetch('https://celestrak.org/NORAD/elements/gp.php?NAME=MICHIBIKI&FORMAT=tle',
      { signal: AbortSignal.timeout(8000) });
    if (r.ok) {
      const t = await r.text();
      if (parseTLE(t)) { tleSource = 'celestrak-group'; return true; }
    }
  } catch(_){}

  for (const s of SATS) {
    try {
      st.textContent = `${s.name}...`;
      const r = await fetch(`https://celestrak.org/NORAD/elements/gp.php?CATNR=${s.norad}&FORMAT=tle`,
        { signal: AbortSignal.timeout(5000) });
      if (r.ok) { parseTLE(await r.text()); }
    } catch(_){}
  }
  if (Object.keys(satRecs).length > 0) { tleSource = 'celestrak-individual'; return true; }

  // フォールバックはinit()で先にロード済みなので再ロード不要
  return false;
}

function loadFallbackTLEs() {
  for (const s of SATS) {
    const tle = FALLBACK_TLES[s.norad];
    if (tle) {
      try { satRecs[s.norad] = { satrec: satellite.twoline2satrec(tle[0], tle[1]), def: s }; } catch(_){}
    }
  }
  tleSource = 'fallback';
}

function parseTLE(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  let found = 0;
  for (let i = 0; i < lines.length;) {
    if (!lines[i].startsWith('1 ')) { i++; continue; }
    const t1 = lines[i]; i++;
    if (i >= lines.length || !lines[i].startsWith('2 ')) continue;
    const t2 = lines[i]; i++;
    const nid = parseInt(t1.substring(2, 7).trim());
    const def = SATS.find(s => s.norad === nid);
    if (!def) continue;
    try {
      satRecs[nid] = { satrec: satellite.twoline2satrec(t1, t2), def };
      const yr = parseInt(t1.substring(18, 20));
      const day = parseFloat(t1.substring(20, 32));
      tleEpoch = `20${yr < 57 ? yr : yr} day ${day.toFixed(2)}`;
      found++;
    } catch(_){}
  }
  return found > 0;
}

// ========== POSITION ==========
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function reverseGeocode(lat, lon) {
  while (lon > 180) lon -= 360;
  while (lon < -180) lon += 360;

  let bestDist = Infinity, bestPt = null;
  for (const p of JP_POINTS) {
    const d = haversineKm(lat, lon, p[0], p[1]);
    if (d < bestDist) { bestDist = d; bestPt = p; }
  }
  if (bestPt && bestDist <= JP_RADIUS_KM) {
    return { name: bestPt[2] + '上空', flag: '🇯🇵', events: bestPt[3] || [] };
  }

  let seaDist = Infinity, seaPt = null;
  for (const p of SEA_POINTS) {
    const d = haversineKm(lat, lon, p[0], p[1]);
    if (d < seaDist) { seaDist = d; seaPt = p; }
  }
  if (seaPt && seaDist <= 500) {
    return { name: seaPt[2] + '上空', flag: '🌊', events: seaPt[3] || [] };
  }

  for (const r of OVERSEAS_REGIONS) {
    if (lat >= r.lat[0] && lat <= r.lat[1] && lon >= r.lon[0] && lon <= r.lon[1]) {
      return { name: r.name, flag: r.flag, events: r.events || [] };
    }
  }

  const ns = lat >= 0 ? 'N' : 'S';
  const ew = lon >= 0 ? 'E' : 'W';
  return { name: `${Math.abs(lat).toFixed(1)}\u00B0${ns} ${Math.abs(lon).toFixed(1)}\u00B0${ew} 付近`, flag: '🌏', events: [] };
}

function calcPos(rec, date) {
  const pv = satellite.propagate(rec.satrec, date);
  if (!pv.position) return null;
  const gmst = satellite.gstime(date);
  const geo = satellite.eciToGeodetic(pv.position, gmst);
  const obsGeo = {
    longitude: satellite.degreesToRadians(observer.lon),
    latitude:  satellite.degreesToRadians(observer.lat),
    height:    observer.alt
  };
  const ecf = satellite.eciToEcf(pv.position, gmst);
  const la = satellite.ecfToLookAngles(obsGeo, ecf);
  return {
    lat: satellite.degreesLat(geo.latitude),
    lon: satellite.degreesLong(geo.longitude),
    alt: geo.height,
    az:  satellite.radiansToDegrees(la.azimuth),
    el:  satellite.radiansToDegrees(la.elevation),
    range: la.rangeSat
  };
}

function getPositions(now) {
  const positions = {};
  for (const [nid, rec] of Object.entries(satRecs)) {
    try { positions[nid] = { pos: calcPos(rec, now), def: rec.def }; }
    catch(_) { positions[nid] = { pos: null, def: rec.def }; }
  }
  return positions;
}

function azDir(az) {
  const j = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
  return j[Math.round(az / 22.5) % 16];
}

function getDuty(positions) {
  return Object.values(positions)
    .filter(p => p.pos && p.def.type === 'QZO' && p.pos.el > 0)
    .sort((a, b) => b.pos.el - a.pos.el)[0] || null;
}

function getOshi(positions) {
  if (oshiSatId) {
    const found = Object.values(positions).find(p => p.def.id === oshiSatId);
    if (found) return found;
  }
  return getDuty(positions) || Object.values(positions).find(p => p.pos) || null;
}

function narrative(def, pos, hour) {
  if (!pos) return { text: 'データ計算中...', event: null, nadir: null };
  const el = pos.el.toFixed(1);
  const dir = azDir(pos.az);
  const alt = Math.round(pos.alt).toLocaleString();
  const nadir = reverseGeocode(pos.lat, pos.lon);
  const v = VOICE[def.personality] || VOICE.calm;
  let text = '';

  if (def.type === 'QZO') {
    if (pos.el > 70)      text = v.zenith(nadir.name, el);
    else if (pos.el > 40) text = v.high(nadir.name, el, dir);
    else if (pos.el > 10) text = v.mid(nadir.name, el);
    else if (pos.el > 0)  text = v.low(nadir.name, dir);
    else                  text = v.hidden(nadir.name, alt);
  } else {
    if (pos.el > 0) text = v.geoVis(nadir.name, el, dir);
    else            text = v.geoHid(nadir.name);
  }

  let ev = null;
  if (nadir.events && nadir.events.length > 0) {
    ev = nadir.events[hour % nadir.events.length];
  }
  return { text, event: ev, nadir };
}

// ========== SKY PLOT ==========
function drawSky(canvas, positions) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 18;
  ctx.clearRect(0, 0, w, h);

  [0, 30, 60].forEach(e => {
    const rr = r * (1 - e / 90);
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1; ctx.stroke();
    if (e > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '8px Space Mono'; ctx.textAlign = 'center';
      ctx.fillText(e + '\u00B0', cx, cy - rr + 10);
    }
  });
  ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();

  [{l:'N',a:-90},{l:'E',a:0},{l:'S',a:90},{l:'W',a:180}].forEach(d => {
    const rad = d.a * Math.PI / 180;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '10px Space Mono'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.l, cx + (r + 12) * Math.cos(rad), cy + (r + 12) * Math.sin(rad));
  });

  const oshi = getOshi(positions);
  Object.values(positions).forEach(({pos, def}) => {
    if (!pos || pos.el < -10) return;
    const vis = pos.el > 0;
    const dist = r * (1 - Math.max(0, pos.el) / 90);
    const azRad = (pos.az - 90) * Math.PI / 180;
    const sx = cx + dist * Math.cos(azRad);
    const sy = cy + dist * Math.sin(azRad);
    const isOshi = oshi && oshi.def.id === def.id;

    if (vis && pos.el > 50) {
      ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 18);
      g.addColorStop(0, def.cd + '0.15)'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fill();
    }

    const dotR = isOshi ? 7 : (vis ? 5 : 3);
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = vis ? def.color : def.cd + '0.3)';
    ctx.fill();

    if (vis) {
      ctx.beginPath(); ctx.arc(sx, sy, dotR + 3, 0, Math.PI * 2);
      ctx.strokeStyle = def.cd + (isOshi ? '0.5)' : '0.2)');
      ctx.lineWidth = isOshi ? 1.5 : 1; ctx.stroke();
    }

    ctx.fillStyle = vis ? def.color : def.cd + '0.4)';
    ctx.font = `bold ${isOshi ? '11' : '9'}px Space Mono`;
    ctx.textAlign = 'center';
    ctx.fillText(def.short, sx, sy - dotR - 5);

    if (isOshi && vis) {
      ctx.fillStyle = def.cd + '0.7)';
      ctx.font = '8px Space Mono';
      ctx.fillText(pos.el.toFixed(1) + '\u00B0', sx, sy + dotR + 10);
    }
  });
}

function checkHandoff(positions, now) {
  const duty = getDuty(positions);
  const currentDutyId = duty ? duty.def.id : null;

  if (lastDutyId === null) {
    lastDutyId = currentDutyId;
    return;
  }

  if (currentDutyId && currentDutyId !== lastDutyId) {
    const fromDef = SATS.find(s => s.id === lastDutyId);
    const toDef = SATS.find(s => s.id === currentDutyId);
    if (fromDef && toDef) {
      const fromPos = Object.values(positions).find(p => p.def.id === lastDutyId);
      const toPos = Object.values(positions).find(p => p.def.id === currentDutyId);
      const nadirFrom = fromPos && fromPos.pos ? reverseGeocode(fromPos.pos.lat, fromPos.pos.lon) : null;
      const nadirTo = toPos && toPos.pos ? reverseGeocode(toPos.pos.lat, toPos.pos.lon) : null;

      // Pick conversation
      const key1 = `${lastDutyId}_${currentDutyId}`;
      const key2 = `${currentDutyId}_${lastDutyId}`;
      const convos = HANDOFF_CONVOS[key1] || HANDOFF_CONVOS[key2] || [[
        {who: lastDutyId, line: '交代だ。あとは頼む。'},
        {who: currentDutyId, line: '了解、引き継ぎます！'},
      ]];
      const convo = convos[Math.floor(Math.random() * convos.length)];

      const nadirName = nadirTo ? nadirTo.name : (nadirFrom ? nadirFrom.name : '太平洋上空');
      const rarity = calcRarity(nadirName);
      const flavors = RARITY_FLAVOR[rarity];
      const flavor = flavors[Math.floor(Math.random() * flavors.length)];
      const cardNo = cardCollection.length + 1;

      handoffEvent = {
        from: fromDef,
        to: toDef,
        time: now,
        nadirName,
        fromEl: fromPos && fromPos.pos ? fromPos.pos.el.toFixed(1) : '?',
        toEl: toPos && toPos.pos ? toPos.pos.el.toFixed(1) : '?',
        convo,
        rarity,
        flavor,
        cardNo,
      };

      // Save QSL card
      const card = {
        no: cardNo,
        from: { id: fromDef.id, emoji: fromDef.emoji, nickname: fromDef.nickname },
        to: { id: toDef.id, emoji: toDef.emoji, nickname: toDef.nickname },
        time: now.toISOString(),
        nadir: nadirName,
        fromEl: handoffEvent.fromEl,
        toEl: handoffEvent.toEl,
        rarity,
        flavor,
      };
      cardCollection.push(card);
      localStorage.setItem('orbit-diary-cards', JSON.stringify(cardCollection));

      // Auto-clear after 30s
      if (handoffFadeTimer) clearTimeout(handoffFadeTimer);
      handoffFadeTimer = setTimeout(() => { handoffEvent = null; }, 30000);
    }
  }
  lastDutyId = currentDutyId;
}

// ========== UI BUILD ==========
function buildOshiMain(positions, now) {
  const el = document.getElementById('oshiMain');
  const entry = getOshi(positions);
  if (!entry) { el.innerHTML = ''; return; }
  const { pos, def } = entry;
  const duty = getDuty(positions);
  const isDuty = duty && duty.def.id === def.id;
  const hour = now.getHours();
  const { text, event, nadir } = narrative(def, pos, hour);
  const vis = pos && pos.el > 0;
  const statusText = isDuty ? '当番中 👑' : (vis ? '視野内' : '休憩中 💤');
  const nadirName = nadir ? `${nadir.flag} ${nadir.name}` : '';

  el.style.background = `linear-gradient(135deg, ${def.cd}0.07), ${def.cd}0.02))`;
  el.style.border = `1px solid ${def.cd}0.15)`;

  el.innerHTML = `
    <div class="ocm-top">
      <div class="ocm-emoji">${def.emoji}</div>
      <div class="ocm-info">
        <div class="ocm-name" style="color:${def.color};">${def.nickname}</div>
        <div class="ocm-status ${isDuty ? 'on' : 'off'}">${statusText}</div>
        <div class="ocm-meta">
          <span>EL <strong>${pos ? pos.el.toFixed(1) + '°' : '---'}</strong></span>
          <span>${pos ? azDir(pos.az) : '---'}</span>
          <span>${pos ? Math.round(pos.alt).toLocaleString() + 'km' : '---'}</span>
        </div>
      </div>
    </div>
    <div class="ocm-speech">${text}</div>
    ${event ? `
      <div class="ocm-event">
        <div class="ocm-event-icon">${event.icon}</div>
        <div class="ocm-event-body">
          <div class="ocm-event-title">${event.title}</div>
          <div class="ocm-event-desc">${event.desc}</div>
        </div>
      </div>
    ` : ''}
    ${nadirName ? `
      <div class="ocm-nadir">
        <span>📌 <span class="loc">${nadirName}</span></span>
        <span style="font-family:'Space Mono',monospace;font-size:9px;">${pos.lat.toFixed(2)}°${pos.lat>0?'N':'S'} ${pos.lon.toFixed(2)}°${pos.lon>0?'E':'W'}</span>
      </div>

}

function buildOshiBar(positions) {
  const el = document.getElementById('oshiBar');
  const duty = getDuty(positions);
  const sorted = Object.values(positions).filter(p => p).sort((a, b) => (b.pos?.el || 0) - (a.pos?.el || 0));
  const oshi = getOshi(positions);

  el.innerHTML = sorted.map(({pos, def}) => {
    const isDuty = duty && duty.def.id === def.id;
    const isOshi = oshi && oshi.def.id === def.id;
    const vis = pos && pos.el > 0;
    return `
      <div class="oshi-chip sat-${def.cls}${isOshi ? ' selected' : ''}${isDuty ? ' on-duty' : ''}" onclick="setOshi('${def.id}')">
        <div class="oshi-avatar">
          ${def.emoji}
          <div class="oshi-elev" style="color:${vis ? def.color : 'var(--text-dim)'}">${pos ? (vis ? pos.el.toFixed(0) + '\u00B0' : '\u25BC') : '...'}</div>
        </div>
        <div class="oshi-name">${def.nickname}</div>
      </div>`;
  }).join('');
}

function buildHandoffCard() {
  const el = document.getElementById('handoffCard');
  if (!handoffEvent) { el.innerHTML = ''; return; }
  const h = handoffEvent;
  const timeStr = h.time.toLocaleTimeString('ja-JP');

  el.innerHTML = `
    <div class="handoff-card">
      <div class="handoff-label">HANDOFF</div>
      <div class="handoff-pair">
        <span>${h.from.emoji}</span>
        <span class="handoff-arrow">\u2192</span>
        <span>${h.to.emoji}</span>
      </div>
      <div class="handoff-names">${h.from.nickname} \u2192 ${h.to.nickname}</div>
      <div style="font-size:10px;color:var(--text-dim);text-align:center;font-family:'Space Mono',monospace;">
        ${timeStr} JST / ${h.nadirName}
      </div>
      <div class="handoff-convo">
        ${h.convo.map(line => {
          const who = SATS.find(s => s.id === line.who);
          return `<div class="handoff-line"><em style="color:${who ? who.color : 'var(--text)'}">${who ? who.emoji + ' ' + who.nickname : line.who}:</em> ${line.line}</div>`;
        }).join('')}

      <div style="text-align:center;margin-top:10px;">
        <span class="qsl-rarity qsl-rarity-${h.rarity.toLowerCase()}">${RARITY_STARS[h.rarity]}</span>
        <div style="font-size:9px;color:var(--text-dim);margin-top:4px;">QSL No.${String(h.cardNo).padStart(4,'0')} \u2014 "${h.flavor}"</div>
      </div>
    </div>
  `;
}

function buildSatsList(positions, targetId) {
  const el = document.getElementById(targetId);
  const sorted = Object.values(positions).filter(p => p).sort((a, b) => (b.pos?.el || 0) - (a.pos?.el || 0));
  const duty = getDuty(positions);

  el.innerHTML = sorted.map(({pos, def}) => {
    const isDuty = duty && duty.def.id === def.id;
    const vis = pos && pos.el > 0;
    let stText, stStyle;
    if (isDuty)                         { stText = '\u5F53\u756A\u4E2D'; stStyle = `background:${def.cd}0.15);color:${def.color};`; }
    else if (def.type === 'GEO' && vis) { stText = '\u5E38\u99D0';       stStyle = `background:${def.cd}0.1);color:${def.color};`; }
    else if (vis)                       { stText = '\u8996\u91CE\u5185';  stStyle = `background:rgba(129,199,132,0.1);color:var(--green);`; }
    else                                { stText = '\u5730\u5E73\u7DDA\u4E0B'; stStyle = `background:rgba(255,255,255,0.04);color:var(--text-dim);`; }

    const nadir = pos ? reverseGeocode(pos.lat, pos.lon) : null;
    const nadirStr = nadir ? `${nadir.flag} ${nadir.name}` : '---';

    return `
      <div class="sr${isDuty ? ' is-duty' : ''}" onclick="setOshi('${def.id}')" style="cursor:pointer;">
        <div class="sr-av" style="background:${def.cd}0.12);border:1.5px solid ${def.cd}${vis ? '0.3' : '0.12'});font-size:16px;">${def.emoji}</div>
        <div class="sr-info">
          <div class="sr-name" style="color:${vis ? def.color : 'var(--text-dim)'};">${def.nickname}${isDuty ? ' \uD83D\uDC51' : ''} <span style="font-size:9px;opacity:0.5;">${def.short}</span></div>
          <div class="sr-sub">${nadirStr} / ${pos ? Math.round(pos.alt).toLocaleString() + 'km' : '---'}</div>
        </div>
        <div class="sr-right">
          <div class="sr-elev" style="color:${vis ? def.color : 'var(--text-dim)'};">${pos ? pos.el.toFixed(1) + '\u00B0' : '---'}</div>
          <div class="sr-status" style="${stStyle}">${stText}</div>
        </div>
      </div>`;
  }).join('');
}

function buildCardPreview() {
  const el = document.getElementById('cardPreview');
  if (cardCollection.length === 0) { el.innerHTML = ''; return; }
  const recent = cardCollection.slice(-3).reverse();
  el.innerHTML = `
    <div class="section-title">\uD83C\uDFB4 \u30AB\u30FC\u30C9\u30B3\u30EC\u30AF\u30B7\u30E7\u30F3 (${cardCollection.length}\u679A)</div>
    <div style="display:flex;gap:8px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;">
      ${recent.map(c => renderQSLMini(c)).join('')}
    </div>
  `;
}

function renderQSLMini(card) {
  const d = new Date(card.time);
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  return `
    <div class="qsl-card" style="flex-shrink:0;width:160px;transform:rotate(${(card.no % 3 - 1) * 1.5}deg);">
      <div class="qsl-top">ORBIT DIARY QSL</div>
      <div class="qsl-divider"></div>
      <div class="qsl-pair">
        <span>${card.from.emoji}</span>
        <span class="qsl-pair-arrow">\u2192</span>
        <span>${card.to.emoji}</span>
      </div>
      <div class="qsl-names">${card.from.nickname} \u2192 ${card.to.nickname}</div>
      <div class="qsl-time">${dateStr}</div>
      <div class="qsl-nadir">${card.nadir}</div>
      <div class="qsl-rarity qsl-rarity-${card.rarity.toLowerCase()}">${RARITY_STARS[card.rarity]}</div>
      <div class="qsl-number">No.${String(card.no).padStart(4,'0')}</div>
    </div>
  `;
}

  return `
    <div class="qsl-card large" style="transform:rotate(${(card.no % 5 - 2) * 1}deg);">
      <div class="qsl-top">ORBIT DIARY QSL CARD</div>
      <div class="qsl-divider"></div>
      <div class="qsl-label">\uD83D\uDCE1 \u5F15\u304D\u7D99\u304E\u8A3C\u660E</div>
      <div class="qsl-pair">
        <span>${card.from.emoji}</span>
        <span class="qsl-pair-arrow">\u2192</span>
        <span>${card.to.emoji}</span>
      </div>
      <div class="qsl-names">${card.from.nickname} \u2192 ${card.to.nickname}</div>
      <div class="qsl-divider"></div>
      <div class="qsl-time">${dateStr}</div>
      <div class="qsl-nadir">\u76F4\u4E0B\u70B9: ${card.nadir}</div>

        <span class="qsl-rarity qsl-rarity-${card.rarity.toLowerCase()}">${RARITY_STARS[card.rarity]}</span>

      <div class="qsl-flavor">"${card.flavor}"</div>

function buildCardsPage() {
  const countEl = document.getElementById('cardsCount');
  const contentEl = document.getElementById('cardsContent');
  const rarityCount = { N:0, R:0, SR:0, SSR:0 };
  cardCollection.forEach(c => rarityCount[c.rarity]++);
  countEl.textContent = `${cardCollection.length}\u679A\u53CE\u96C6 \u2014 N:${rarityCount.N} R:${rarityCount.R} SR:${rarityCount.SR} SSR:${rarityCount.SSR}`;

  if (cardCollection.length === 0) {
    contentEl.innerHTML = '<div class="cards-empty">\u307E\u3060\u30AB\u30FC\u30C9\u304C\u3042\u308A\u307E\u305B\u3093\u3002<br>\u5F15\u304D\u7D99\u304E\u304C\u767A\u751F\u3059\u308B\u3068QSL\u30AB\u30FC\u30C9\u304C\u3082\u3089\u3048\u307E\u3059\uFF01</div>';
    return;
  }

  contentEl.innerHTML = `<div class="cards-grid">${cardCollection.slice().reverse().map(c => renderQSLMini(c)).join('')}</div>`;
}

function buildSettingsPage() {
  const grid = document.getElementById('settingsOshiGrid');
  grid.innerHTML = SATS.map(s => `
    <div class="settings-oshi-btn${oshiSatId === s.id ? ' selected' : ''}" onclick="setOshi('${s.id}')">
      <div class="emoji">${s.emoji}</div>
      <div class="name" style="color:${s.color};">${s.nickname}</div>
      <div class="sub">${s.name}</div>
    </div>
  `).join('');
}

function buildSourceBar() {
  const bar = document.getElementById('sourceBar');
  if (bar) {
    bar.innerHTML =
      `SOURCE: ${tleSource} (${Object.keys(satRecs).length}\u6A5F)<br>` +
      `SGP4 propagation via satellite.js<br>` +
      `${tleEpoch ? 'TLE EPOCH: ' + tleEpoch : 'Fallback TLE (\u7CBE\u5EA6\u4F4E)'}<br>` +
      `UPDATE: 1\u79D2\u9593\u9694\u30EA\u30A2\u30EB\u30BF\u30A4\u30E0\u8A08\u7B97`;
  }
  const bar2 = document.getElementById('sourceBarSats');
  if (bar2) bar2.innerHTML = bar ? bar.innerHTML : '';
}

// ========== NAVIGATION ==========
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageMap = { home:'pageHome', sats:'pageSats', cards:'pageCards', settings:'pageSettings' };
  const target = document.getElementById(pageMap[page]);
  if (target) target.classList.add('active');

  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const pages = ['home','sats','cards','settings'];
    btn.classList.toggle('active', pages[i] === page);
  });

  if (page === 'cards') buildCardsPage();
  if (page === 'settings') buildSettingsPage();
}

function setOshi(id) {
  oshiSatId = id;
  localStorage.setItem('orbit-diary-oshi', id);
  if (currentPage === 'settings') buildSettingsPage();
  if (currentPage !== 'home') switchPage('home');
}

// ========== MAIN LOOP ==========
function update() {
  const now = new Date();
  const positions = getPositions(now);

  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
  const skyTimeEl = document.getElementById('skyTime');
  if (skyTimeEl) skyTimeEl.textContent = now.toLocaleTimeString('ja-JP');

  // Handoff detection (every cycle)
  checkHandoff(positions, now);

  // Home page
  if (currentPage === 'home') {
    buildOshiMain(positions, now);
    buildOshiBar(positions);
    drawSky(document.getElementById('skyCanvas'), positions);
    buildHandoffCard();
    buildSatsList(positions, 'satsList');
    buildCardPreview();
  }

  // Sats page
  if (currentPage === 'sats') {
    buildSatsList(positions, 'satsListFull');
  }
}

// ========== INIT ==========
async function init() {
  // 1) まずフォールバックTLEで即表示
  loadFallbackTLEs();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main').style.display = 'block';
  document.getElementById('bottomNav').style.display = 'flex';
  update();
  setInterval(update, 1000);
  window.addEventListener('resize', update);

  // 2) バックグラウンドで最新TLEを取得→取得できたら差し替え
  try {
    await fetchTLEs();
    buildSourceBar();
  } catch(_) {}
}

// ========== STARFIELD ==========
(function(){
  const c = document.getElementById('starCanvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let stars = [];

  function resize() {
    c.width = window.innerWidth * dpr;
    c.height = window.innerHeight * dpr;
    c.style.width = window.innerWidth + 'px';
    c.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    createStars();
  }

  function createStars() {
    stars = [];
    const w = window.innerWidth, h = window.innerHeight;
    const count = Math.floor((w * h) / 3000);
    const colors = [
      'rgba(255,255,255,','rgba(255,255,255,','rgba(255,255,255,',
      'rgba(255,213,79,','rgba(100,181,246,','rgba(179,157,219,',
    ];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.5 + 0.3,
        base: 0.2 + Math.random() * 0.6,
        speed: 0.3 + Math.random() * 0.7,
        phase: Math.random() * Math.PI * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        drift: (Math.random() - 0.5) * 0.02,
      });
    }
  }

  let t = 0;
  function draw() {
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    t += 0.01;
    for (const s of stars) {
      const flicker = s.base + Math.sin(t * s.speed + s.phase) * 0.25;
      const alpha = Math.max(0.05, Math.min(1, flicker));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + alpha.toFixed(2) + ')';
      ctx.fill();
      s.y += s.drift;
      if (s.y < -2) s.y = h + 2;
      if (s.y > h + 2) s.y = -2;
    }
    requestAnimationFrame(draw);
  }

  resize();
  draw();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
})();

init();
</script>
